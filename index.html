    <script>
        // ═══════════════════════════════════════
        // GLOBAL STATE
        // ═══════════════════════════════════════
        let currentMatchId = null, currentMatchData = null, allActions = [];
        let rallyCounter = 1, setNumber = 1, currentRallyId = null, actionInRally = 0;
        let playerNames = { A: 'A', B: 'B' };
        let isViewingHistorical = false;
        let historicalActions = [];
        let historicalNames = { A: 'A', B: 'B' };

        // ═══════════════════ DISPLAY MAPS ═══════════════════
        const outcomeDisplay = {
            'KNT': 'Kill (Clean)', 'KT': 'Kill (Touch)', 'BLK': 'Blocked',
            'BLK-C': 'Blocked (Covered)', 'OUT': 'Hit Out', 'NET': 'Into Net',
            'DUG': 'Dug', 'D-ERR': 'Dig Error'
        };
        const shotDisplay = { 'H': 'Hard', 'S': 'Soft' };
        const dirDisplay = { 'L': 'Line', 'LC': 'Line-Cut', 'S': 'Seam', 'C': 'Cross', 'CS': 'Sharp Cross', 'JB': 'Jumbo Deep' };
        const setHeightDisplay = { 'H': 'High', 'L': 'Low / Quick' };
        const setDepthDisplay = { 'T': 'Tight', 'S': 'Standard', 'O': 'Off' };
        const setLateralDisplay = { '1': 'Left Pin', '2': 'Left-Center', '3': 'Center', '4': 'Right-Center', '5': 'Right Pin' };
        const zoneDisplay = {
            '1L': 'Net Left', '1C': 'Net Center', '1R': 'Net Right',
            '2L': 'Mid Left', '2C': 'Mid Center', '2R': 'Mid Right',
            '3L': 'Deep Left', '3C': 'Deep Center', '3R': 'Deep Right'
        };
        const qualityDisplay = { '0': 'Ace/Overpass', '1': 'Poor', '2': 'Medium', '3': 'Perfect' };
        const serveTypeDisplay = { 'JS': 'Jump Spin', 'JF': 'Jump Float', 'SF': 'Standing Float', 'HY': 'Hybrid' };
        const serveFromDisplay = { '1': 'Left Corner', '2': 'Left-Center', '3': 'Center', '4': 'Right-Center', '5': 'Right Corner' };
        const strengthDisplay = { '1': 'Soft', '2': 'Normal', '3': 'Hard' };
        const setQualityDisplay = { '1': 'Bad', '2': 'Good', '3': 'Perfect' };

        function attackerName(a) { return a === 'A' ? playerNames.A : (a === 'B' ? playerNames.B : 'Opponent'); }

        // ═══════════════════ INIT ═══════════════════
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('matchDate').value = new Date().toISOString().split('T')[0];
            loadMatches();
            checkForActiveMatch();
            updateAllLabels();
            onOutcomeChange();
            // Ensure correct initial tab state
            document.getElementById('loggingCard').style.display = 'none';
            document.getElementById('recentLogCard').style.display = 'none';
            document.getElementById('continuationBanner').style.display = 'none';
        });

        function checkForActiveMatch() {
            const saved = localStorage.getItem('currentMatch');
            if (!saved) return;
            try {
                const data = JSON.parse(saved);
                currentMatchId = data.id;
                currentMatchData = data;
                rallyCounter = data.rallyCounter || 1;
                setNumber = data.setNumber || 1;
                currentRallyId = data.currentRallyId || null;
                actionInRally = data.actionInRally || 0;
                playerNames = data.playerNames || { A: 'A', B: 'B' };
                updateAllLabels();
                selectSetUI(setNumber);
                document.getElementById('currentMatchDisplay').textContent = `${playerNames.A}/${playerNames.B} vs ${data.opponentName || 'Opp'}`;
                showLoggingInterface();
                if (currentRallyId) {
                    showContinuationBanner();
                }
                loadActionsForCurrentMatch();
            } catch (e) {
                console.error('Error loading saved match:', e);
                localStorage.removeItem('currentMatch');
            }
        }

        function showLoggingInterface() {
            document.getElementById('setupCard').style.display = 'none';
            document.getElementById('loggingCard').style.display = 'block';
            document.getElementById('recentLogCard').style.display = 'block';
        }

        function hideLoggingInterface() {
            document.getElementById('setupCard').style.display = 'block';
            document.getElementById('loggingCard').style.display = 'none';
            document.getElementById('recentLogCard').style.display = 'none';
            document.getElementById('continuationBanner').style.display = 'none';
            document.getElementById('logCardTitle').textContent = 'Log Rally';
            document.getElementById('logButton').textContent = 'Log Action';
        }

        function showContinuationBanner() {
            document.getElementById('continuationBanner').style.display = 'flex';
            document.getElementById('bannerText').textContent = `Rally #${rallyCounter} continues`;
            document.getElementById('bannerDetail').textContent = `Action ${actionInRally + 1}`;
            document.getElementById('logCardTitle').textContent = `Rally #${rallyCounter} (cont.)`;
            document.getElementById('logButton').textContent = 'Log Next Action';
        }

        function updateAllLabels() {
            const selectors = ['#attacker', '#server', '#pointWonBy', '#digBy'];
            selectors.forEach(sel => {
                const el = document.querySelector(sel);
                if (!el) return;
                const aOpt = el.querySelector('option[value="A"]');
                const bOpt = el.querySelector('option[value="B"]');
                if (aOpt) aOpt.textContent = playerNames.A;
                if (bOpt) bOpt.textContent = playerNames.B;
            });
        }

        function selectSet(s) {
            setNumber = s;
            selectSetUI(s);
            saveCurrentMatchToLocal();
        }

        function selectSetUI(s) {
            document.querySelectorAll('.set-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('setBtn' + s);
            if (btn) btn.classList.add('active');
        }

        // ═══════════════════ MATCH MANAGEMENT ═══════════════════
        async function startMatch() {
            const pA = document.getElementById('playerAName').value.trim() || 'A';
            const pB = document.getElementById('playerBName').value.trim() || 'B';
            const opponentName = document.getElementById('opponentName').value.trim() || 'Opp';
            const matchDate = document.getElementById('matchDate').value || new Date().toISOString().split('T')[0];

            playerNames = { A: pA, B: pB };
            updateAllLabels();

            const matchData = {
                playerAName: pA,
                playerBName: pB,
                opponentName,
                matchDate,
                createdAt: new Date().toISOString()
            };

            try {
                const docRef = await window.addDoc(window.matchesCollection, matchData);
                currentMatchId = docRef.id;
                currentMatchData = { id: docRef.id, ...matchData, playerNames };
                rallyCounter = 1;
                setNumber = 1;
                allActions = [];
                currentRallyId = null;
                actionInRally = 0;
                isViewingHistorical = false;

                selectSetUI(1);
                saveCurrentMatchToLocal();
                document.getElementById('currentMatchDisplay').textContent = `${pA}/${pB} vs ${opponentName}`;
                showLoggingInterface();
                document.getElementById('continuationBanner').style.display = 'none';
                document.getElementById('logCardTitle').textContent = 'Log Rally';
                document.getElementById('logButton').textContent = 'Log Action';
                document.getElementById('digDetails').style.display = 'none';
                renderRecentRallies();
                showToast('Match started! 🏐');
            } catch (e) {
                console.error('Start match error:', e);
                showToast('Error starting match: ' + e.message);
            }
        }

        function saveCurrentMatchToLocal() {
            if (!currentMatchId) return;
            localStorage.setItem('currentMatch', JSON.stringify({
                ...currentMatchData,
                rallyCounter,
                setNumber,
                playerNames,
                currentRallyId,
                actionInRally
            }));
        }

        async function endMatch() {
            if (currentRallyId && actionInRally > 0) {
                if (!confirm('A rally is in progress. End it and save the match?')) return;
            }
            if (!confirm('End this match and save all data?')) return;

            currentMatchId = null;
            currentMatchData = null;
            allActions = [];
            rallyCounter = 1;
            setNumber = 1;
            currentRallyId = null;
            actionInRally = 0;
            isViewingHistorical = false;
            playerNames = { A: 'A', B: 'B' };
            localStorage.removeItem('currentMatch');
            document.getElementById('currentMatchDisplay').textContent = 'No match set';
            hideLoggingInterface();
            selectSetUI(1);
            updateAllLabels();
            showToast('Match saved! ✅');
            loadMatches();
        }

        // ═══════════════════ RESUME MATCH ═══════════════════
        async function resumeMatch(matchId) {
            try {
                // Get match data directly by querying all matches and finding the right one
                const allMatchesSnap = await window.getDocs(window.collection(window.db, 'matches'));
                let md = null;
                allMatchesSnap.forEach(d => {
                    if (d.id === matchId) md = { id: d.id, ...d.data() };
                });

                if (!md) {
                    showToast('Match not found in database');
                    return;
                }

                // End current match if active
                if (currentMatchId) {
                    localStorage.removeItem('currentMatch');
                }

                playerNames = { A: md.playerAName || 'A', B: md.playerBName || 'B' };
                currentMatchId = matchId;
                currentMatchData = { ...md, playerNames };
                currentRallyId = null;
                actionInRally = 0;
                isViewingHistorical = false;
                updateAllLabels();
                selectSetUI(setNumber);

                document.getElementById('currentMatchDisplay').textContent = `${playerNames.A}/${playerNames.B} vs ${md.opponentName || 'Opp'}`;
                showLoggingInterface();
                document.getElementById('continuationBanner').style.display = 'none';
                document.getElementById('logCardTitle').textContent = 'Log Rally';
                document.getElementById('logButton').textContent = 'Log Action';
                document.getElementById('digDetails').style.display = 'none';

                await loadActionsForCurrentMatch();
                saveCurrentMatchToLocal();
                showToast('Resumed match! 🏐');
                switchTab('log');
            } catch (e) {
                console.error('Resume match error:', e);
                showToast('Error resuming match: ' + e.message);
            }
        }

        async function loadActionsForCurrentMatch() {
            if (!currentMatchId) return;
            try {
                const q = window.query(
                    window.actionsCollection,
                    window.where('matchId', '==', currentMatchId),
                    window.orderBy('timestamp', 'asc')
                );
                const qs = await window.getDocs(q);
                allActions = [];
                qs.forEach(d => allActions.push({ id: d.id, ...d.data() }));
                if (allActions.length > 0) {
                    const rallyNumbers = allActions.map(a => a.rallyNumber || 0);
                    rallyCounter = Math.max(...rallyNumbers) + 1;
                } else {
                    rallyCounter = 1;
                }
                saveCurrentMatchToLocal();
                renderRecentRallies();
            } catch (e) {
                console.error('Load actions error:', e);
            }
        }

        // ═══════════════════ VIEW HISTORICAL MATCH STATS ═══════════════════
        async function viewMatchStats(matchId, pA, pB) {
            try {
                const q = window.query(
                    window.actionsCollection,
                    window.where('matchId', '==', matchId),
                    window.orderBy('timestamp', 'asc')
                );
                const qs = await window.getDocs(q);
                const actions = [];
                qs.forEach(d => actions.push({ id: d.id, ...d.data() }));

                isViewingHistorical = true;
                historicalActions = allActions;
                historicalNames = { ...playerNames };
                allActions = actions;
                playerNames = { A: pA || 'A', B: pB || 'B' };

                switchTab('stats');
                refreshStats();
                showToast(`Viewing historical stats — ${actions.length} actions`);

                // Auto-revert after 30 seconds
                setTimeout(() => {
                    if (isViewingHistorical) {
                        allActions = historicalActions;
                        playerNames = historicalNames;
                        isViewingHistorical = false;
                        showToast('Returned to current match stats');
                    }
                }, 30000);
            } catch (e) {
                console.error('View match stats error:', e);
                showToast('Error loading match stats');
            }
        }

        // ═══════════════════ ACTION LOGGING ═══════════════════
        function onOutcomeChange() {
            const o = document.getElementById('outcome').value;
            document.getElementById('digDetails').style.display =
                (o === 'DUG' || o === 'D-ERR' || o === 'BLK-C') ? 'block' : 'none';
        }

        function isRallyEnding(o) {
            return ['KNT', 'KT', 'BLK', 'OUT', 'NET', 'D-ERR'].includes(o);
        }

        async function logAction() {
            if (!currentMatchId) {
                showToast('Start a match first!');
                return;
            }

            const outcome = document.getElementById('outcome').value;

            const action = {
                matchId: currentMatchId,
                rallyId: currentRallyId,
                actionNumber: actionInRally + 1,
                setNumber,
                rallyNumber: rallyCounter,
                server: document.getElementById('server').value,
                serveType: document.getElementById('serveType').value,
                serveStrength: document.getElementById('serveStrength').value,
                serveFrom: document.getElementById('serveFrom').value,
                serveZone: document.getElementById('serveZone').value,
                recQuality: document.getElementById('recQuality').value || null,
                setQuality: document.getElementById('setQuality').value,
                setHeight: document.getElementById('setHeight').value,
                setDepth: document.getElementById('setDepth').value,
                setLateral: document.getElementById('setLateral').value,
                attacker: document.getElementById('attacker').value,
                fromZone: document.getElementById('fromZone').value,
                shotType: document.getElementById('shotType').value,
                direction: document.getElementById('direction').value,
                outcome,
                digBy: (outcome === 'DUG' || outcome === 'D-ERR' || outcome === 'BLK-C') ?
                    document.getElementById('digBy').value : null,
                digQuality: (outcome === 'DUG' || outcome === 'D-ERR' || outcome === 'BLK-C') ?
                    document.getElementById('digQuality').value : null,
                pointWonBy: document.getElementById('pointWonBy').value,
                note: document.getElementById('note').value || '',
                isRallyEnd: isRallyEnding(outcome),
                timestamp: new Date().toISOString()
            };

            try {
                const docRef = await window.addDoc(window.actionsCollection, action);
                action.id = docRef.id;
                if (!currentRallyId) {
                    currentRallyId = docRef.id;
                    action.rallyId = currentRallyId;
                }
            } catch (e) {
                console.error('Save action error:', e);
                action.id = 'local-' + Date.now();
                if (!currentRallyId) {
                    currentRallyId = action.id;
                    action.rallyId = currentRallyId;
                }
            }

            allActions.push(action);
            actionInRally++;

            if (isRallyEnding(outcome)) {
                // Rally over
                currentRallyId = null;
                actionInRally = 0;
                rallyCounter++;
                document.getElementById('continuationBanner').style.display = 'none';
                document.getElementById('logCardTitle').textContent = 'Log Rally';
                document.getElementById('logButton').textContent = 'Log Action';
                // Auto-set server for next rally (point winner serves)
                const nextServer = action.pointWonBy === 'Opp' ? 'Opp' :
                    (action.pointWonBy === 'A' ? 'A' : 'B');
                document.getElementById('server').value = nextServer;
                document.getElementById('recQuality').value = '';
                document.getElementById('digDetails').style.display = 'none';
                document.getElementById('note').value = '';
            } else {
                // Rally continues
                showContinuationBanner();
                document.getElementById('server').value = action.pointWonBy;
                document.getElementById('recQuality').value = '';
            }

            saveCurrentMatchToLocal();
            renderRecentRallies();
            showToast(outcome === 'DUG' ? 'Dug! Rally continues 🔄' : 'Action logged ✅');
        }

        function finishRallyEarly() {
            if (!confirm('End this rally now? The point winner will be whoever is selected in "Point Won By".')) return;
            currentRallyId = null;
            actionInRally = 0;
            rallyCounter++;
            document.getElementById('continuationBanner').style.display = 'none';
            document.getElementById('logCardTitle').textContent = 'Log Rally';
            document.getElementById('logButton').textContent = 'Log Action';
            const pwb = document.getElementById('pointWonBy').value;
            document.getElementById('server').value = pwb === 'Opp' ? 'Opp' : (pwb === 'A' ? 'A' : 'B');
            document.getElementById('recQuality').value = '';
            document.getElementById('digDetails').style.display = 'none';
            document.getElementById('note').value = '';
            saveCurrentMatchToLocal();
            showToast('Rally ended early ✕');
        }

        function newRally() {
            if (currentRallyId && actionInRally > 0) {
                if (!confirm('A rally is in progress. Start a new one anyway?')) return;
            }
            currentRallyId = null;
            actionInRally = 0;
            document.getElementById('continuationBanner').style.display = 'none';
            document.getElementById('logCardTitle').textContent = 'Log Rally';
            document.getElementById('logButton').textContent = 'Log Action';
            document.getElementById('digDetails').style.display = 'none';
            document.getElementById('note').value = '';
            saveCurrentMatchToLocal();
            showToast('Starting new rally ➕');
        }

        async function undoLast() {
            if (allActions.length === 0) return;
            const last = allActions.pop();
            actionInRally--;

            if (actionInRally <= 0) {
                currentRallyId = null;
                actionInRally = 0;
                rallyCounter = Math.max(1, rallyCounter - 1);
                document.getElementById('continuationBanner').style.display = 'none';
                document.getElementById('logCardTitle').textContent = 'Log Rally';
                document.getElementById('logButton').textContent = 'Log Action';
                document.getElementById('digDetails').style.display = 'none';
            }

            if (last.id && !last.id.startsWith('local-')) {
                try {
                    await window.deleteDoc(window.doc(window.db, 'actions', last.id));
                } catch (e) {
                    console.error('Delete error:', e);
                }
            }

            saveCurrentMatchToLocal();
            renderRecentRallies();
            showToast('Last action undone ↩');
        }

        // ═══════════════════ RENDER RECENT RALLIES ═══════════════════
        function renderRecentRallies() {
            const container = document.getElementById('recentRallies');
            const countEl = document.getElementById('rallyCount');
            const completedRallies = allActions.filter(a => a.isRallyEnd).length;
            countEl.textContent = `(${allActions.length} actions, ${completedRallies} completed rallies)`;

            if (allActions.length === 0) {
                container.innerHTML = '<div class="empty-state">No rallies logged yet</div>';
                return;
            }

            // Group actions by rallyId
            const grouped = {};
            allActions.forEach(a => {
                const key = a.rallyId || a.id;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(a);
            });

            const groups = Object.values(grouped).slice(-10).reverse();

            container.innerHTML = groups.map(actions => {
                const first = actions[0];
                const lastAction = actions[actions.length - 1];
                const pwbName = lastAction.pointWonBy === 'A' ? playerNames.A :
                    (lastAction.pointWonBy === 'B' ? playerNames.B : 'Opp');

                return `<div class="rally-group">
                    <div class="rally-group-header">
                        <span>Set ${first.setNumber} · Rally #${first.rallyNumber}</span>
                        <span style="font-size:0.68rem;color:var(--accent);">→ ${pwbName} point</span>
                    </div>
                    ${actions.map((a, i) => {
                        const oc = getOutcomeClass(a.outcome);
                        const attName = attackerName(a.attacker);
                        const setInfo = `<span class="set-detail">Set: ${setQualityDisplay[a.setQuality] || a.setQuality} ${setHeightDisplay[a.setHeight] || a.setHeight} ${setDepthDisplay[a.setDepth] || a.setDepth} · ${setLateralDisplay[a.setLateral] || a.setLateral}</span>`;
                        let digInfo = '';
                        if (a.digBy) {
                            const dn = a.digBy === 'A' ? playerNames.A : (a.digBy === 'B' ? playerNames.B : 'Opp');
                            digInfo = `<span class="action-meta">Dig: ${dn} (${qualityDisplay[a.digQuality] || a.digQuality})</span>`;
                        }
                        return `<div class="action-row">
                            <span class="action-number">${a.actionNumber}</span>
                            <span class="rally-badge ${oc}">${outcomeDisplay[a.outcome] || a.outcome}</span>
                            <span class="action-info">
                                <strong>${attName}</strong> ${zoneDisplay[a.fromZone] || a.fromZone} · ${shotDisplay[a.shotType] || a.shotType} · ${dirDisplay[a.direction] || a.direction}
                                ${setInfo} ${digInfo}
                                ${a.note ? `<br><span class="action-meta">📝 ${a.note}</span>` : ''}
                            </span>
                        </div>`;
                    }).join('')}
                </div>`;
            }).join('');
        }

        function getOutcomeClass(o) {
            if (o === 'KNT' || o === 'KT') return 'badge-kill';
            if (o === 'OUT' || o === 'NET') return 'badge-error';
            if (o === 'BLK') return 'badge-block';
            if (o === 'DUG' || o === 'BLK-C') return 'badge-dug';
            return 'badge-neutral';
        }

        // ═══════════════════ STATS ═══════════════════
        function refreshStats() {
            const fp = document.getElementById('filterPlayer')?.value || 'All';
            const fs = document.getElementById('filterShotType')?.value || 'All';
            const fd = document.getElementById('filterDirection')?.value || 'All';
            const fset = document.getElementById('filterSet')?.value || 'All';

            let attacks = [...allActions].filter(a => a.attacker);
            let serves = [...allActions];
            if (fp !== 'All') {
                attacks = attacks.filter(a => a.attacker === fp);
                serves = serves.filter(a => a.server === fp);
            }
            if (fs !== 'All') attacks = attacks.filter(a => a.shotType === fs);
            if (fd !== 'All') attacks = attacks.filter(a => a.direction === fd);
            if (fset !== 'All') {
                attacks = attacks.filter(a => a.setNumber == fset);
                serves = serves.filter(a => a.setNumber == fset);
            }

            const total = attacks.length;
            const kills = attacks.filter(a => a.outcome === 'KNT' || a.outcome === 'KT').length;
            const errors = attacks.filter(a => a.outcome === 'OUT' || a.outcome === 'NET').length;
            const blocks = attacks.filter(a => a.outcome === 'BLK').length;
            const dug = attacks.filter(a => a.outcome === 'DUG').length;
            const eff = total > 0 ? (((kills - errors - blocks) / total) * 100).toFixed(1) : '0.0';
            const kp = total > 0 ? ((kills / total) * 100).toFixed(1) : '0';
            const ep = total > 0 ? ((errors / total) * 100).toFixed(1) : '0';
            const bp = total > 0 ? ((blocks / total) * 100).toFixed(1) : '0';

            let html = '';

            // Historical banner
            if (isViewingHistorical) {
                html += `<div class="continuation-banner" style="margin-bottom:10px;">
                    <div><div class="banner-text">📊 Viewing Historical Match Stats</div>
                    <div class="banner-detail">These stats are from a saved match. They will revert in 30 seconds.</div></div>
                    <button class="btn btn-outline btn-xs" onclick="exitHistoricalView()">Return to Current</button>
                </div>`;
            }

            // Attack Overview
            html += `<div class="stats-section"><div class="stats-section-title">Attack Overview</div>
                <div class="stats-grid-4">
                    <div class="stat-card good"><div class="stat-value">${kills} (${kp}%)</div><div class="stat-label">Kills</div></div>
                    <div class="stat-card bad"><div class="stat-value">${errors} (${ep}%)</div><div class="stat-label">Errors</div></div>
                    <div class="stat-card warn"><div class="stat-value">${blocks} (${bp}%)</div><div class="stat-label">Blocked</div></div>
                    <div class="stat-card ${parseFloat(eff) >= 0 ? 'good' : 'bad'}"><div class="stat-value">${eff}%</div><div class="stat-label">Efficiency</div></div>
                </div>
                <div class="stats-grid" style="margin-top:4px;">
                    <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Attacks</div></div>
                    <div class="stat-card"><div class="stat-value">${dug}</div><div class="stat-label">Dug</div></div>
                    <div class="stat-card"><div class="stat-value">${kp}%</div><div class="stat-label">Kill %</div></div>
                </div></div>`;

            if (total === 0) {
                html += '<div class="empty-state"><div class="icon">📊</div>No attack data for this filter. Log some actions first.</div>';
            } else {
                // Outcome by Set Quality
                html += `<div class="stats-section"><div class="stats-section-title">Attack Outcome by Set Quality</div>`;
                html += buildOutcomeTable(attacks, 'setQuality', setQualityDisplay, ['1', '2', '3']);
                html += `</div>`;

                // Outcome by Set Height & Depth
                html += `<div class="stats-section"><div class="stats-section-title">Attack Outcome by Set Height & Depth</div>
                    <div class="form-row">`;
                html += `<div>${buildOutcomeTable(attacks, 'setHeight', setHeightDisplay, ['H', 'L'])}</div>`;
                html += `<div>${buildOutcomeTable(attacks, 'setDepth', setDepthDisplay, ['T', 'S', 'O'])}</div>`;
                html += `</div></div>`;

                // Outcome by Direction
                html += `<div class="stats-section"><div class="stats-section-title">Attack Outcome by Direction</div>`;
                html += buildOutcomeTable(attacks, 'direction', dirDisplay, ['L', 'LC', 'S', 'C', 'CS', 'JB']);
                html += `</div>`;

                // Outcome by Attack Zone
                html += `<div class="stats-section"><div class="stats-section-title">Attack Outcome by Zone</div>`;
                html += buildOutcomeTable(attacks, 'fromZone', zoneDisplay, ['1L', '1C', '1R', '2L', '2C', '2R', '3L', '3C', '3R']);
                html += `</div>`;

                // Attack by Receive Quality
                const attacksWithRec = attacks.filter(a => a.recQuality !== null && a.recQuality !== '');
                if (attacksWithRec.length > 0) {
                    html += `<div class="stats-section"><div class="stats-section-title">Attack Outcome by Receive Quality</div>`;
                    html += buildOutcomeTable(attacksWithRec, 'recQuality', qualityDisplay, ['0', '1', '2', '3']);
                    html += `</div>`;
                }
            }

            // Serve Performance
            html += `<div class="stats-section"><div class="stats-section-title">Serve Performance</div>`;
            html += buildServeTable(serves, fp);
            html += `</div>`;

            // Dig Performance
            let digs = allActions.filter(a => a.digBy);
            if (fset !== 'All') digs = digs.filter(a => a.setNumber == fset);
            html += `<div class="stats-section"><div class="stats-section-title">Dig Performance</div>`;
            if (digs.length === 0) {
                html += '<div class="empty-state">No digs recorded</div>';
            } else {
                html += `<table class="mini-table"><tr><th>Dig By</th><th>Poor (1)</th><th>Medium (2)</th><th>Perfect (3)</th><th>Total</th></tr>`;
                ['A', 'B', 'Opp'].forEach(p => {
                    const pd = digs.filter(d => d.digBy === p);
                    if (pd.length === 0) return;
                    const name = p === 'A' ? playerNames.A : (p === 'B' ? playerNames.B : 'Opponent');
                    html += `<tr><td><strong>${name}</strong></td>
                        <td>${pd.filter(d => d.digQuality === '1').length}</td>
                        <td>${pd.filter(d => d.digQuality === '2').length}</td>
                        <td>${pd.filter(d => d.digQuality === '3').length}</td>
                        <td><strong>${pd.length}</strong></td></tr>`;
                });
                html += '</table>';
            }
            html += `</div>`;

            document.getElementById('statsContent').innerHTML = html;
        }

        function buildOutcomeTable(actions, field, displayMap, keys) {
            if (actions.length === 0) return '<div class="empty-state">No data for this filter</div>';
            const outcomes = ['KNT', 'KT', 'BLK', 'OUT', 'NET', 'DUG'];
            let html = `<table class="mini-table"><tr><th>${field.replace(/([A-Z])/g, ' $1').trim()}</th>`;
            outcomes.forEach(o => html += `<th>${outcomeDisplay[o]}</th>`);
            html += '<th>Total</th><th>Kill%</th></tr>';
            keys.forEach(key => {
                const subset = actions.filter(a => a[field] === key);
                if (subset.length === 0) return;
                const label = displayMap[key] || key;
                const kills = subset.filter(a => a.outcome === 'KNT' || a.outcome === 'KT').length;
                const kp = ((kills / subset.length) * 100).toFixed(0);
                html += `<tr><td><strong>${label}</strong></td>`;
                outcomes.forEach(o => {
                    const c = subset.filter(a => a.outcome === o).length;
                    const p = subset.length > 0 ? ((c / subset.length) * 100).toFixed(0) : 0;
                    const cls = (o === 'OUT' || o === 'NET' || o === 'BLK') && c > 0 && p > 30 ? 'highlight' : '';
                    html += `<td class="${cls}">${c}${c > 0 ? ' (' + p + '%)' : ''}</td>`;
                });
                html += `<td><strong>${subset.length}</strong></td><td style="color:${kp >= 40 ? 'var(--success)' : 'var(--danger)'}"><strong>${kp}%</strong></td></tr>`;
            });
            html += '</table>';
            return html;
        }

        function buildServeTable(serves, fp) {
            if (serves.length === 0) return '<div class="empty-state">No serve data</div>';
            const servers = fp === 'All' ? ['A', 'B', 'Opp'] : [fp];
            let html = `<table class="mini-table"><tr><th>Server</th><th>Total</th><th>Aces</th><th>Errors</th><th>Avg Str</th><th>Most Used Zone</th></tr>`;
            servers.forEach(s => {
                const ss = serves.filter(a => a.server === s);
                if (ss.length === 0) return;
                const name = s === 'A' ? playerNames.A : (s === 'B' ? playerNames.B : 'Opponent');
                const aces = ss.filter(a => a.recQuality === '0' && a.pointWonBy === s).length;
                const errs = ss.filter(a => a.outcome === 'OUT' || a.outcome === 'NET' || (a.recQuality === '0' && a.pointWonBy !== s)).length;
                const avgStr = (ss.reduce((sum, a) => sum + parseInt(a.serveStrength || 2), 0) / ss.length).toFixed(1);
                const zoneMap = {};
                ss.forEach(a => { const z = a.serveZone; if (z) zoneMap[z] = (zoneMap[z] || 0) + 1; });
                const topZone = Object.entries(zoneMap).sort((a, b) => b[1] - a[1])[0];
                const topZoneStr = topZone ? `${zoneDisplay[topZone[0]] || topZone[0]} (${topZone[1]})` : '-';
                html += `<tr><td><strong>${name}</strong></td><td>${ss.length}</td>
                    <td style="color:var(--success);">${aces}</td>
                    <td style="color:var(--danger);">${errs}</td>
                    <td>${avgStr}</td><td>${topZoneStr}</td></tr>`;
            });
            html += '</table>';
            return html;
        }

        function exitHistoricalView() {
            allActions = historicalActions;
            playerNames = historicalNames;
            isViewingHistorical = false;
            refreshStats();
            showToast('Returned to current match');
        }

        // ═══════════════════ HISTORY & MATCHES ═══════════════════
        async function loadMatches() {
            try {
                const qs = await window.getDocs(window.query(window.matchesCollection, window.orderBy('createdAt', 'desc')));
                const matches = [];
                qs.forEach(d => matches.push({ id: d.id, ...d.data() }));
                renderMatchList(matches);
                renderExistingMatches(matches);
            } catch (e) {
                console.error('Load matches error:', e);
                document.getElementById('matchList').innerHTML = '<div class="empty-state">⚠️ Could not load matches. Check your Firebase config and connection.</div>';
            }
        }

        function renderMatchList(matches) {
            const c = document.getElementById('matchList');
            if (matches.length === 0) {
                c.innerHTML = '<div class="empty-state"><div class="icon">📋</div>No saved matches yet</div>';
                return;
            }
            c.innerHTML = matches.map(m => `
                <div class="card" style="margin:5px 0;padding:9px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
                        <div>
                            <strong>${m.playerAName || 'A'}/${m.playerBName || 'B'}</strong> vs ${m.opponentName || 'Opp'}<br>
                            <span style="font-size:0.68rem;color:var(--subtext);">${m.matchDate || 'Unknown date'}</span>
                        </div>
                        <div style="display:flex;gap:4px;">
                            <button class="btn btn-outline btn-xs" onclick="resumeMatch('${m.id}')">Resume</button>
                            <button class="btn btn-outline btn-xs" onclick="viewMatchStats('${m.id}','${m.playerAName || 'A'}','${m.playerBName || 'B'}')">Stats</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function renderExistingMatches(matches) {
            const c = document.getElementById('existingMatches');
            if (matches.length === 0) {
                c.innerHTML = '<p style="font-size:0.75rem;color:var(--subtext);">No past matches found.</p>';
                return;
            }
            c.innerHTML = '<p style="font-size:0.7rem;color:var(--subtext);margin-bottom:3px;">Click a match to resume it:</p>' +
                matches.slice(0, 10).map(m =>
                    `<span class="match-chip" onclick="resumeMatch('${m.id}')">${m.playerAName || 'A'}/${m.playerBName || 'B'} vs ${m.opponentName || 'Opp'}</span>`
                ).join('');
        }

        async function deleteAllData() {
            if (!confirm('DELETE ALL DATA? This cannot be undone.')) return;
            if (prompt('Type DELETE to confirm:') !== 'DELETE') return;
            try {
                const as = await window.getDocs(window.actionsCollection);
                for (const d of as.docs) await window.deleteDoc(window.doc(window.db, 'actions', d.id));
                const ms = await window.getDocs(window.matchesCollection);
                for (const d of ms.docs) await window.deleteDoc(window.doc(window.db, 'matches', d.id));
                allActions = [];
                rallyCounter = 1;
                currentMatchId = null;
                currentMatchData = null;
                currentRallyId = null;
                actionInRally = 0;
                isViewingHistorical = false;
                playerNames = { A: 'A', B: 'B' };
                localStorage.removeItem('currentMatch');
                document.getElementById('currentMatchDisplay').textContent = 'No match set';
                hideLoggingInterface();
                updateAllLabels();
                selectSetUI(1);
                loadMatches();
                showToast('All data deleted');
            } catch (e) {
                console.error('Delete all error:', e);
                showToast('Error: ' + e.message);
            }
        }

        // ═══════════════════ UI HELPERS ═══════════════════
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('[id^="tab-"]').forEach(d => d.style.display = 'none');
            const tabMap = { log: 0, stats: 1, history: 2, matches: 3 };
            const tabIndex = tabMap[tabName];
            if (tabIndex !== undefined) {
                document.querySelectorAll('.tab')[tabIndex].classList.add('active');
            }
            document.getElementById('tab-' + tabName).style.display = 'block';
            if (tabName === 'stats') refreshStats();
            if (tabName === 'history' || tabName === 'matches') loadMatches();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // Debug helper - logs state to console
        function debugState() {
            console.log({
                currentMatchId,
                rallyCounter,
                setNumber,
                currentRallyId,
                actionInRally,
                actionsCount: allActions.length,
                isViewingHistorical,
                playerNames
            });
        }
        // Expose for console use
        window.debugState = debugState;
    </script>
